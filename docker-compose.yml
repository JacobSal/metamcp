services:
  # ========================================================================
  # Ollama Service for LLM Hosting
  # ollama:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.ollama
  #   container_name: metamcp-ollama
  #   ports:
  #     - "11435:11434"           # Ollama API port (host 11435 -> container 11434)
  #   environment:
  #     # Ensure Ollama can reach MetamCP
  #     MCP_API_URL: "http://app:12008"
  #     # (optional: any other env vars your model uses)
  #   volumes:
  #     - .:/workspace            # Mount repo so model code can import metamcp clients
  #   depends_on:
  #     app:
  #       condition: service_started
  #   networks:
  #     - metamcp-network

  ollama:
    image: ollama/ollama:latest
    container_name: metamcp-ollama
    ports:
      - "11435:11434"           # Ollama API port (host 11435 -> container 11434)
    environment:
      # Ensure Ollama can reach MetamCP
      MCP_API_URL: "http://app:12008"
      # (optional: any other env vars your model uses)
    volumes:
      - .:/workspace            # Mount repo so model code can import metamcp clients
      - ollama_data:/root/.ollama  # Persist Ollama data (models, etc.)
      - ./modelfiles:/modelfiles # Mount local model files for development
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}  # Use all available GPUs by default, or specify with env var
              capabilities: [gpu]
    depends_on:
      app:
        condition: service_started
    networks:
      - metamcp-network
  
  # =========================================================================
  # OpenWebUI Service for hosting the frontend
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.8.6-cuda #ollama-webui/ollama-webui:main
    container_name: metamcp-openwebui
    ports:
      - "3000:8080"           # OpenWebUI port (host 3000 -> container 8080)
    environment:
      # Ensure OpenWebUI can reach MetamCP and Ollama
      MCP_API_URL: "http://app:12008"
      OLLAMA_API_BASE_URL: "http://ollama:11434/api"
      USE_CUDA: true
      USE_OLLAMA: true
    depends_on:
      app:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - metamcp-network

  # ========================================================================
  # MCP Local Hosted Clients
  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: github-mcp
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
    restart: unless-stopped
    ports:
      - "8082:8082"
    networks:
      - metamcp-network

  filesystem-mcp:
    build:
      context: .
      dockerfile: Dockerfile.filesystem
    container_name: filesystem-mcp
    restart: unless-stopped
    environment:
      FILESYSTEM_DIRECTORIES: ${FILESYSTEM_DIRECTORIES}
    ports:
      - "3002:3002"  # Assuming the custom build exposes 3000
    networks:
      - metamcp-network

  context7-mcp:
    build:
      dockerfile: Dockerfile.context7
    container_name: context7-mcp
    restart: unless-stopped
    networks:
      - metamcp-network

  # ========================================================================
  # MetamCP Application Service
  app:
    container_name: metamcp
    image: ghcr.io/metatool-ai/metamcp:latest
    pull_policy: always
    env_file:
      - .env
    ports:
      - "12008:12008"
    environment:
      # Postgres connection details
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-metamcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m3t4mcp}
      POSTGRES_DB: ${POSTGRES_DB:-metamcp_db}
      
      # Database configuration (composed from above vars)
      DATABASE_URL: postgresql://${POSTGRES_USER:-metamcp_user}:${POSTGRES_PASSWORD:-m3t4mcp}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-metamcp_db}
      
      # Application URL configuration
      APP_URL: ${APP_URL:-http://localhost:12008}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:12008}
      
      # Auth configuration
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-your-super-secret-key-change-this-in-production}
      
      # Docker networking fix
      TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL: ${TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL:-true}
      
      # ========================================================================
      # Bootstrap Configuration Examples
      # ========================================================================
      
      # Multiple Users - Define different users with different roles
      # BOOTSTRAP_USERS: |
      #   [
      #     {
      #       "email": "admin@company.com",
      #       "password": "admin-secure-password",
      #       "name": "System Administrator"
      #     },
      #     {
      #       "email": "developer@company.com",
      #       "password": "dev-secure-password",
      #       "name": "Lead Developer"
      #     },
      #     {
      #       "email": "analyst@company.com",
      #       "password": "analyst-secure-password",
      #       "name": "Data Analyst"
      #     }
      #   ]
      
      # API Keys - Assign keys to specific users using user_email
      # BOOTSTRAP_API_KEYS: |
      #   [
      #     {
      #       "name": "Admin Production Key",
      #       "is_public": false,
      #       "user_email": "admin@company.com"
      #     },
      #     {
      #       "name": "Developer Key",
      #       "is_public": false,
      #       "user_email": "developer@company.com"
      #     },
      #     {
      #       "name": "Analyst Key",
      #       "is_public": false,
      #       "user_email": "analyst@company.com"
      #     },
      #     {
      #       "name": "Public API Key",
      #       "is_public": true
      #     }
      #   ]
      
      # Namespaces - Create user-specific workspaces
      # BOOTSTRAP_NAMESPACES: |
      #   [
      #     {
      #       "name": "Admin Workspace",
      #       "description": "Administrator's private workspace",
      #       "is_public": false,
      #       "user_email": "admin@company.com",
      #       "update": true
      #     },
      #     {
      #       "name": "Development",
      #       "description": "Development environment",
      #       "is_public": false,
      #       "user_email": "developer@company.com",
      #       "update": true
      #     },
      #     {
      #       "name": "Analytics",
      #       "description": "Data analytics workspace",
      #       "is_public": false,
      #       "user_email": "analyst@company.com",
      #       "update": true
      #     },
      #     {
      #       "name": "Shared Resources",
      #       "description": "Public shared namespace",
      #       "is_public": true,
      #       "update": true
      #     }
      #   ]
      
      # Endpoints - Configure endpoints with different owners and auth settings
      # Note: Endpoints can optionally specify which namespace they should be created in
      # BOOTSTRAP_ENDPOINTS: |
      #   [
      #     {
      #       "name": "admin-api",
      #       "description": "Admin-only API endpoint",
      #       "namespace": "Production",
      #       "enable_auth": true,
      #       "enable_auth_query": false,
      #       "enable_auth_oauth": true,
      #       "is_public": false,
      #       "user_email": "admin@company.com",
      #       "update": true
      #     },
      #     {
      #       "name": "dev-api",
      #       "description": "Development API endpoint",
      #       "namespace": "Development",
      #       "enable_auth": true,
      #       "enable_auth_query": true,
      #       "enable_auth_oauth": false,
      #       "is_public": false,
      #       "user_email": "developer@company.com",
      #       "update": true
      #     },
      #     {
      #       "name": "analytics-api",
      #       "description": "Analytics API endpoint",
      #       "namespace": "Analytics",
      #       "enable_auth": true,
      #       "enable_auth_query": false,
      #       "enable_auth_oauth": false,
      #       "is_public": false,
      #       "user_email": "analyst@company.com",
      #       "update": true
      #     },
      #     {
      #       "name": "public-api",
      #       "description": "Public API endpoint - no auth required",
      #       "namespace": "Shared Resources",
      #       "enable_auth": false,
      #       "enable_auth_query": false,
      #       "enable_auth_oauth": false,
      #       "is_public": true,
      #       "update": true
      #     }
      #   ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - metamcp-network

  postgres:
    image: postgres:16-alpine
    container_name: metamcp-pg
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metamcp_db}
      POSTGRES_USER: ${POSTGRES_USER:-metamcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m3t4mcp}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-9433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metamcp_user} -d ${POSTGRES_DB:-metamcp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - metamcp-network

volumes:
  postgres_data:
    driver: local
  ollama_data:
    name: ollama_data

networks:
  metamcp-network:
    driver: bridge
